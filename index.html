    const calculateAge = (birthDate, deathDate = null) => {
      if (!birthDate) return null;
      const birth = new Date(birthDate);
      const end = deathDate ? new Date(deathDate) : new Date();
      let age = end.getFullYear() - birth.getFullYear();
      const monthDiff = end.getMonth() - birth.getMonth();
      if (monthDiff < 0 || (monthDiff === 0 && end.getDate() < birth.getDate())) {
        age--;
      }
      return age;
    };

              {children.length > 0 && (
                <div>
                  <label className="text-sm text-gray-600 font-medium mb-2 block">Enfants ({children.length})</label>
                  <div className="space-y-1">
                    {children.map(child => (
                      <div key={child.id} className="flex items-center gap-2 p-2 bg-green-50 rounded text-sm">
                        <div className={`w-6 h-6 rounded-full flex items-center justify-center text-white text-xs ${
                          child.gender === 'male' ? 'bg-blue-500' : 'bg-pink-500'
                        }`}>
                          {child.firstName[0]}
                        </div>
                        <span>{child.firstName} {child.lastName}</span>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </section>

            {/* Contact */}
            {(person.contact.email || person.contact.phone || person.contact.address) && (
              <section>
                <h3 className="text-lg font-semibold text-primary-700 mb-3">Contact</h3>
                <div className="space-y-2 bg-gray-50 p-4 rounded-lg text-sm">
                  {person.contact.email && <p>📧 {person.contact.email}</p>}
                  {person.contact.phone && <p>📞 {person.contact.phone}</p>}
                  {person.contact.address && <p>📍 {person.contact.address}</p>}
                </div>
              </section>
            )}
          </div>
          
          <div className="p-6 border-t bg-gray-50 space-y-2">
            <button
              onClick={onEdit}
              className="w-full flex items-center justify-center gap-2 px-4 py-3 bg-primary-500 text-white rounded-lg hover:bg-primary-600 transition font-medium"
            >
              <Icons.Edit />
              Modifier
            </button>
            <button
              onClick={() => {
                if (confirm('Êtes-vous sûr de vouloir supprimer cette personne ?')) {
                  onDelete(person.id);
                }
              }}
              className="w-full flex items-center justify-center gap-2 px-4 py-3 bg-red-500 text-white rounded-lg hover:bg-red-600 transition font-medium"
            >
              <Icons.Trash />
              Supprimer
            </button>
          </div>
        </div>
      );
    };

    // ==================== TREE VIEW ====================

    const TreeView = ({ persons, selectedPerson, onSelectPerson, collapsedNodes, onToggleCollapse, focusedPersonId }) => {
      
      const getAncestorPath = (personId) => {
        const path = new Set();
        let currentId = personId;
        path.add(currentId);
        
        while (currentId) {
          const person = persons.find(p => p.id === currentId);
          if (!person || person.parentIds.length === 0) break;
          currentId = person.parentIds[0];
          path.add(currentId);
        }
        return path;
      };

      const shouldShowNode = (personId, ancestorPath) => {
        if (!focusedPersonId) return true;
        if (ancestorPath.has(personId)) return true;
        
        const person = persons.find(p => p.id === personId);
        if (person && person.parentIds.includes(focusedPersonId)) {
          return true;
        }
        return false;
      };

      // Vérifie si au moins un enfant direct a été développé (a des enfants visibles)
      const hasAnyChildExpanded = (personId) => {
        const children = persons.filter(p => p.parentIds.includes(personId));
        return children.some(child => {
          const grandchildren = persons.filter(p => p.parentIds.includes(child.id));
          return grandchildren.length > 0 && !collapsedNodes.has(child.id);
        });
      };

      const groupBySpouse = (children) => {
        const ep1Children = [];
        const ep2Children = [];
        
        children.forEach(child => {
          const person = persons.find(p => p.id === child.person.id);
          if (person && person.parentIds.includes('ep1')) {
            ep1Children.push(child);
          } else if (person && person.parentIds.includes('ep2')) {
            ep2Children.push(child);
          }
        });
        
        return {
          ep1: ep1Children.length > 0 ? ep1Children : null,
          ep2: ep2Children.length > 0 ? ep2Children : null
        };
      };

      const buildTree = (rootId, ancestorPath) => {
        const root = persons.find(p => p.id === rootId);
        if (!root) return null;
        
        const getChildren = (personId) => {
          return persons.filter(p => p.parentIds.includes(personId))
            .filter(p => shouldShowNode(p.id, ancestorPath));
        };
        
        const buildNode = (person, level = 0) => {
          const children = getChildren(person.id);
          return {
            person,
            level,
            children: children.map(child => buildNode(child, level + 1))
          };
        };
        
        return buildNode(root);
      };
      
      const renderNode = (node, isHighlighted = false) => {
        if (!node) return null;
        
        const isCollapsed = collapsedNodes.has(node.person.id);
        const hasChildren = node.children.length > 0;
        const shouldHighlight = isHighlighted || (focusedPersonId === node.person.id);
        
        // ✨ LOGIQUE CORRIGÉE :
        // - Gen 0 (patriarche) : enfants en 2 colonnes verticales
        // - Gen 1 (enfants du patriarche) : 
        //     * Par défaut VERTICAL
        //     * HORIZONTAL si au moins un a été développé
        // - Gen 2+ : TOUJOURS VERTICAL
        
        let childrenLayout = 'vertical'; // Par défaut
        
        if (node.person.id === 'gp') {
          // Cas spécial patriarche : toujours 2 colonnes
          childrenLayout = 'patriarch';
        } else if (node.level === 1) {
          // Gen 1 : horizontal SI au moins un enfant de gen1 a été développé
          const patriarchHasExpandedChild = hasAnyChildExpanded('gp');
          childrenLayout = patriarchHasExpandedChild ? 'horizontal' : 'vertical';
        } else {
          // Gen 2+ : toujours vertical
          childrenLayout = 'vertical';
        }
        
        const groupedChildren = node.person.id === 'gp' ? groupBySpouse(node.children) : null;
        
        return (
          <div key={node.person.id} className="flex flex-col items-center">
            <div className={`mb-4 relative ${shouldHighlight ? 'ring-4 ring-yellow-400 rounded-lg shadow-2xl' : ''}`}>
              <PersonCard
                person={node.person}
                onClick={onSelectPerson}
                isSelected={selectedPerson?.id === node.person.id}
              />
              
              {hasChildren && (
                <button
                  onClick={(e) => {
                    e.stopPropagation();
                    onToggleCollapse(node.person.id);
                  }}
                  className="absolute -bottom-2 left-1/2 -translate-x-1/2 w-6 h-6 bg-primary-500 text-white rounded-full text-xs flex items-center justify-center hover:bg-primary-600 transition shadow-lg z-10"
                >
                  {isCollapsed ? '+' : '−'}
                </button>
              )}
            </div>
            
            {hasChildren && !isCollapsed && (
              <div>
                {childrenLayout === 'patriarch' ? (
                  // ✨ PATRIARCHE : 2 colonnes verticales par épouse
                  <div className="flex gap-16">
                    {groupedChildren.ep1 && (
                      <div className="flex flex-col items-start">
                        <div className="text-xs text-gray-500 mb-3 italic font-medium">Épouse 1 : Lisette NGOUOYOU</div>
                        <div className="space-y-3 relative">
                          {/* Ligne verticale reliant tous les enfants de l'épouse 1 */}
                          {groupedChildren.ep1.length > 1 && (
                            <div className="absolute left-0 top-10 bottom-10 w-0.5 bg-gray-300" />
                          )}
                          {groupedChildren.ep1.map(child => (
                            <div key={child.person.id} className="flex items-center gap-3">
                              <div className="w-8 h-0.5 bg-gray-300" />
                              {renderNode(child, shouldHighlight)}
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                    {groupedChildren.ep2 && (
                      <div className="flex flex-col items-start">
                        <div className="text-xs text-gray-500 mb-3 italic font-medium">Épouse 2 : Elise KEMGANG</div>
                        <div className="space-y-3 relative">
                          {/* Ligne verticale reliant tous les enfants de l'épouse 2 */}
                          {groupedChildren.ep2.length > 1 && (
                            <div className="absolute left-0 top-10 bottom-10 w-0.5 bg-gray-300" />
                          )}
                          {groupedChildren.ep2.map(child => (
                            <div key={child.person.id} className="flex items-center gap-3">
                              <div className="w-8 h-0.5 bg-gray-300" />
                              {renderNode(child, shouldHighlight)}
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                ) : childrenLayout === 'vertical' ? (
                  // ✨ LAYOUT VERTICAL (Gen 1 par défaut, Gen 2+ toujours)
                  <div className="relative pl-8">
                    {/* Ligne verticale du parent */}
                    <div className="absolute left-0 top-0 w-0.5 h-3 bg-gray-300" />
                    
                    <div className="space-y-3">
                      {node.children.map(child => (
                        <div key={child.person.id} className="flex items-center gap-3 relative">
                          {/* Ligne horizontale vers l'enfant */}
                          <div className="w-8 h-0.5 bg-gray-300" />
                          {renderNode(child, shouldHighlight)}
                        </div>
                      ))}
                    </div>
                  </div>
                ) : (
                  // ✨ LAYOUT HORIZONTAL (Gen 1 quand au moins un développé)
                  <div className="relative pl-8">
                    {/* Ligne verticale du parent vers le bas */}
                    <div className="absolute left-0 top-0 w-0.5 h-6 bg-gray-300" />
                    
                    {/* Ligne horizontale reliant tous les enfants */}
                    {node.children.length > 1 && (
                      <div className="absolute top-6 left-0 right-0 h-0.5 bg-gray-300" />
                    )}
                    
                    <div className="flex gap-6 pt-6">
                      {node.children.map((child, idx) => (
                        <div key={child.person.id} className="relative pt-6">
                          {/* Ligne verticale vers chaque enfant */}
                          <div className="absolute top-0 left-1/2 w-0.5 h-6 bg-gray-300" />
                          {renderNode(child, shouldHighlight)}
                        </div>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>
        );
      };
      
      const rootPerson = persons.find(p => p.id === 'gp');
      const ancestorPath = focusedPersonId ? getAncestorPath(focusedPersonId) : new Set();
      const tree = buildTree(rootPerson?.id, ancestorPath);
      
      return (
        <div className="w-full h-full overflow-auto scrollbar-hide p-8">
          <div className="inline-block min-w-full">
            {tree ? renderNode(tree) : (
              <div className="text-center text-gray-500 py-20">
                <p>Aucune donnée à afficher</p>
              </div>
            )}
          </div>
        </div>
      );
    };

    // ==================== STATS DASHBOARD ====================
    const StatsDashboard = ({ persons }) => {
      const totalPersons = persons.length;
      const livingPersons = persons.filter(p => p.status === 'alive').length;
      const maleCount = persons.filter(p => p.gender === 'male').length;
      const femaleCount = persons.filter(p => p.gender === 'female').length;
      
      const generations = [...new Set(persons.map(p => {
        if (p.id.startsWith('gp') || p.id.startsWith('ep')) return 0;
        if (p.id.startsWith('g1_')) return 1;
        if (p.id.startsWith('g2_')) return 2;
        return 3;
      }))].length;
      
      return (
        <div className="p-6 space-y-6">
          <h2 className="text-2xl font-display font-bold text-primary-700">Statistiques familiales</h2>
          
          <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
            <div className="bg-gradient-to-br from-blue-500 to-blue-600 text-white p-6 rounded-xl shadow-lg">
              <div className="text-3xl font-bold mb-1">{totalPersons}</div>
              <div className="text-blue-100 text-sm">Personnes</div>
            </div>
            <div className="bg-gradient-to-br from-green-500 to-green-600 text-white p-6 rounded-xl shadow-lg">
              <div className="text-3xl font-bold mb-1">{livingPersons}</div>
              <div className="text-green-100 text-sm">Vivants</div>
            </div>
            <div className="bg-gradient-to-br from-purple-500 to-purple-600 text-white p-6 rounded-xl shadow-lg">
              <div className="text-3xl font-bold mb-1">{generations}</div>
              <div className="text-purple-100 text-sm">Générations</div>
            </div>
            <div className="bg-gradient-to-br from-orange-500 to-orange-600 text-white p-6 rounded-xl shadow-lg">
              <div className="text-3xl font-bold mb-1">{maleCount + femaleCount}</div>
              <div className="text-orange-100 text-sm">Membres</div>
            </div>
          </div>
          
          <div className="bg-white p-6 rounded-xl shadow-lg">
            <h3 className="text-lg font-semibold text-primary-700 mb-4">Répartition par genre</h3>
            <div className="flex gap-4">
              <div className="flex-1 bg-blue-50 p-4 rounded-lg">
                <div className="text-2xl font-bold text-blue-600">{maleCount}</div>
                <div className="text-sm text-gray-600">Hommes ({Math.round(maleCount/totalPersons*100)}%)</div>
                <div className="mt-2 h-2 bg-blue-200 rounded-full overflow-hidden">
                  <div className="h-full bg-blue-500" style={{width: `${maleCount/totalPersons*100}%`}} />
                </div>
              </div>
              <div className="flex-1 bg-pink-50 p-4 rounded-lg">
                <div className="text-2xl font-bold text-pink-600">{femaleCount}</div>
                <div className="text-sm text-gray-600">Femmes ({Math.round(femaleCount/totalPersons*100)}%)</div>
                <div className="mt-2 h-2 bg-pink-200 rounded-full overflow-hidden">
                  <div className="h-full bg-pink-500" style={{width: `${femaleCount/totalPersons*100}%`}} />
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    // ==================== MAIN APP ====================
    const FamilyTreeApp = () => {
      const [persons, setPersons] = useState(() => {
        const saved = localStorage.getItem('familyTreeData');
        return saved ? JSON.parse(saved) : initialFamilyData;
      });
      const [selectedPerson, setSelectedPerson] = useState(null);
      const [searchQuery, setSearchQuery] = useState('');
      const [activeView, setActiveView] = useState('tree');
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [editingPerson, setEditingPerson] = useState(null);
      const [showAddModal, setShowAddModal] = useState(false);
      const [collapsedNodes, setCollapsedNodes] = useState(new Set());
      const [focusedPersonId, setFocusedPersonId] = useState(null);
      
      useEffect(() => {
        localStorage.setItem('familyTreeData', JSON.stringify(persons));
      }, [persons]);

      // Recherche intelligente avec focus
      useEffect(() => {
        if (searchQuery.trim()) {
          const query = searchQuery.toLowerCase();
          const found = persons.find(p => 
            p.firstName.toLowerCase().includes(query) ||
            (p.lastName && p.lastName.toLowerCase().includes(query)) ||
            (p.bio && p.bio.toLowerCase().includes(query))
          );
          
          if (found) {
            setFocusedPersonId(found.id);
            setSelectedPerson(found);
          }
        } else {
          setFocusedPersonId(null);
        }
      }, [searchQuery, persons]);
      
      const filteredPersons = persons.filter(p => {
        if (!searchQuery) return true;
        const query = searchQuery.toLowerCase();
        return (
          p.firstName.toLowerCase().includes(query) ||
          (p.lastName && p.lastName.toLowerCase().includes(query)) ||
          (p.bio && p.bio.toLowerCase().includes(query))
        );
      });
      
      const handleExportJSON = () => {
        const dataStr = JSON.stringify(persons, null, 2);
        const dataBlob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(dataBlob);
        const link = document.createElement('a');
        link.href = url;
        link.download = `famille-djime-${new Date().toISOString().split('T')[0]}.json`;
        link.click();
        URL.revokeObjectURL(url);
      };

      const handleImportJSON = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            try {
              const data = JSON.parse(event.target.result);
              if (Array.isArray(data)) {
                setPersons(data);
                alert('Import réussi !');
              }
            } catch (err) {
              alert('Erreur lors de l\'import du fichier');
            }
          };
          reader.readAsText(file);
        }
      };

      const handleToggleCollapse = (personId) => {
        const newCollapsed = new Set(collapsedNodes);
        if (newCollapsed.has(personId)) {
          newCollapsed.delete(personId);
        } else {
          newCollapsed.add(personId);
        }
        setCollapsedNodes(newCollapsed);
      };

      const handleExpandAll = () => {
        setCollapsedNodes(new Set());
      };

      const handleCollapseAll = () => {
        const allParents = new Set(
          persons
            .filter(p => persons.some(child => child.parentIds.includes(p.id)))
            .map(p => p.id)
        );
        setCollapsedNodes(allParents);
      };
      
      const handleSavePerson = (personData) => {
        if (editingPerson) {
          setPersons(persons.map(p => p.id === personData.id ? personData : p));
          setSelectedPerson(personData);
        } else {
          setPersons([...persons, personData]);
        }
        setEditingPerson(null);
        setShowAddModal(false);
      };

      const handleDeletePerson = (personId) => {
        setPersons(persons.filter(p => p.id !== personId));
        setSelectedPerson(null);
      };
      
      return (
        <div className="h-screen flex flex-col">
          <header className="bg-white border-b border-gray-200 shadow-sm">
            <div className="px-6 py-4 flex items-center justify-between">
              <div className="flex items-center gap-4">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 bg-gradient-to-br from-primary-500 to-gold-400 rounded-lg flex items-center justify-center">
                    <Icons.Tree />
                  </div>
                  <div>
                    <h1 className="text-xl font-display font-bold text-primary-700">DJIMETree</h1>
                    <p className="text-xs text-gray-500">Famille DJIME</p>
                  </div>
                </div>
              </div>
              
              <div className="flex items-center gap-3">
                <div className="relative">
                  <input
                    type="text"
                    placeholder="Rechercher..."
                    value={searchQuery}
                    onChange={(e) => setSearchQuery(e.target.value)}
                    className="pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none w-64"
                  />
                  <div className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
                    <Icons.Search />
                  </div>
                </div>

                {activeView === 'tree' && (
                  <>
                    <button 
                      onClick={handleExpandAll}
                      className="flex items-center gap-2 px-3 py-2 bg-green-500 text-white rounded-lg hover:bg-green-600 transition text-sm font-medium"
                      title="Tout développer"
                    >
                      <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" />
                      </svg>
                    </button>
                    <button 
                      onClick={handleCollapseAll}
                      className="flex items-center gap-2 px-3 py-2 bg-orange-500 text-white rounded-lg hover:bg-orange-600 transition text-sm font-medium"
                      title="Tout réduire"
                    >
                      <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 9V4.5M9 9H4.5M9 9L3.75 3.75M9 15v4.5M9 15H4.5M9 15l-5.25 5.25M15 9h4.5M15 9V4.5M15 9l5.25-5.25M15 15h4.5M15 15v4.5m0-4.5l5.25 5.25" />
                      </svg>
                    </button>
                  </>
                )}
                
                <label className="flex items-center gap-2 px-4 py-2 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition font-medium cursor-pointer">
                  <Icons.Upload />
                  Importer
                  <input type="file" accept=".json" onChange={handleImportJSON} className="hidden" />
                </label>
                
                <button
                  onClick={handleExportJSON}
                  className="flex items-center gap-2 px-4 py-2 bg-gold-400 text-white rounded-lg hover:bg-gold-500 transition font-medium"
                >
                  <Icons.Download />
                  Exporter
                </button>
              </div>
            </div>
          </header>
          
          <div className="flex-1 flex overflow-hidden">
            <aside className={`bg-white border-r border-gray-200 transition-all ${sidebarOpen ? 'w-64' : 'w-16'}`}>
              <nav className="p-4 space-y-2">
                <button
                  onClick={() => setActiveView('tree')}
                  className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition ${
                    activeView === 'tree' ? 'bg-primary-500 text-white' : 'text-gray-700 hover:bg-gray-100'
                  }`}
                >
                  <Icons.Tree />
                  {sidebarOpen && <span className="font-medium">Arbre</span>}
                </button>
                
                <button
                  onClick={() => setActiveView('stats')}
                  className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition ${
                    activeView === 'stats' ? 'bg-primary-500 text-white' : 'text-gray-700 hover:bg-gray-100'
                  }`}
                >
                  <Icons.Stats />
                  {sidebarOpen && <span className="font-medium">Statistiques</span>}
                </button>
              </nav>
            </aside>
            
            <main className="flex-1 overflow-hidden bg-gradient-to-br from-slate-50 to-blue-50">
              {activeView === 'tree' && (
                <TreeView
                  persons={persons}
                  selectedPerson={selectedPerson}
                  onSelectPerson={setSelectedPerson}
                  collapsedNodes={collapsedNodes}
                  onToggleCollapse={handleToggleCollapse}
                  focusedPersonId={focusedPersonId}
                />
              )}
              
              {activeView === 'stats' && (
                <div className="h-full overflow-y-auto scrollbar-hide">
                  <StatsDashboard persons={persons} />
                </div>
              )}
            </main>
            
            {selectedPerson && (
              <aside className="w-96 border-l border-gray-200 shadow-xl overflow-hidden">
                <DetailPanel
                  person={selectedPerson}
                  allPersons={persons}
                  onClose={() => setSelectedPerson(null)}
                  onEdit={() => {
                    setEditingPerson(selectedPerson);
                    setSelectedPerson(null);
                  }}
                  onDelete={handleDeletePerson}
                />
              </aside>
            )}
          </div>
          
          <button 
            onClick={() => setShowAddModal(true)}
            className="fixed bottom-8 right-8 w-14 h-14 bg-gradient-to-br from-primary-500 to-primary-600 text-white rounded-full shadow-2xl hover:shadow-3xl hover:scale-110 transition-all flex items-center justify-center group"
          >
            <Icons.Plus />
            <span className="absolute right-full mr-3 px-3 py-1 bg-gray-900 text-white text-sm rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">
              Ajouter une personne
            </span>
          </button>

          {(editingPerson || showAddModal) && (
            <EditModal
              person={editingPerson}
              allPersons={persons}
              onClose={() => {
                setEditingPerson(null);
                setShowAddModal(false);
              }}
              onSave={handleSavePerson}
            />
          )}
        </div>
      );
    };

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<FamilyTreeApp />);
  </script>
</body>
</html>
